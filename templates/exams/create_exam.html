{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">
                        {% if exam %}تعديل اختبار - {{ exam.name }}{% else %}إنشاء اختبار جديد - {{ classroom.name }}{% endif %}
                    </h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <!-- استخدم crispy forms -->
                        {{ form|crispy }}
                        
                        <div class="d-flex justify-content-between mt-4">
                             <a href="{% url 'exams:exam_list' classroom.id %}" class="btn btn-secondary">
                                 إلغاء
                             </a>
                             <button type="submit" class="btn btn-primary">
                                 {% if submit_label %}{{ submit_label }}{% else %}إنشاء الاختبار والمتابعة لإدخال العلامات{% endif %}
                             </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

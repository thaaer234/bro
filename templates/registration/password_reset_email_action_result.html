{% extends 'base.html' %}

{% block content %}
<div class="container py-5" dir="rtl">
    <div class="card shadow-sm mx-auto" style="max-width: 720px;">
        <div class="card-body p-4">
            <h2 class="mb-3">{{ title }}</h2>
            <p class="mb-0">{{ message }}</p>
            <div class="mt-4">
                {% if whatsapp_url %}
                <a class="btn btn-success ml-2" href="{{ whatsapp_url }}" target="_blank" rel="noopener">إرسال الكود عبر واتساب</a>
                {% endif %}
                <a class="btn btn-primary" href="{% url 'registration:superuser_password_reset' %}">لوحة طلبات كلمات المرور</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

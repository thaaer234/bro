{% if messages %}
<section class="alert-messages" aria-live="polite" aria-atomic="true">
    {% for msg in messages %}
    <div class="alert alert-{{ msg.tags|default:'info' }} alert-dismissible fade show" role="alert">
        <div class="d-flex align-items-start gap-3">
            <span class="workspace-pill" style="padding:.45rem .7rem;">
                {% if msg.tags == 'danger' or msg.tags == 'error' %}
                <i class="fas fa-triangle-exclamation"></i>
                <span>خطأ</span>
                {% elif msg.tags == 'success' %}
                <i class="fas fa-circle-check"></i>
                <span>تم</span>
                {% elif msg.tags == 'warning' %}
                <i class="fas fa-bell"></i>
                <span>تنبيه</span>
                {% else %}
                <i class="fas fa-circle-info"></i>
                <span>معلومة</span>
                {% endif %}
            </span>
            <div class="flex-grow-1">{{ msg }}</div>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="إغلاق"></button>
        </div>
    </div>
    {% endfor %}
</section>
{% endif %}

{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="module-header">
    <h2>تسجيل حضور الطلاب</h2>
    <div class="header-actions">
        <a href="{% url 'attendance:attendance' %}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> العودة للسجل
        </a>
        <button type="submit" form="attendanceForm" class="btn btn-success">
            <i class="fas fa-save"></i> حفظ الحضور
        </button>
    </div>
</div>

{% include "partials/_alerts.html" %}

<form method="post" id="attendanceForm">
    {% csrf_token %}

    <div class="attendance-filters row mb-4">
        <div class="col-md-4">
            <label for="date" class="form-label">التاريخ</label>
            <input type="date" name="date" id="date" class="form-control" value="{{ today|date:'Y-m-d' }}" required>
        </div>
        <div class="col-md-4">
            <label for="classroom" class="form-label">الشعبة</label>
            <select name="classroom" id="classroom" class="form-control" required>
                <option value="">اختر الشعبة</option>
                {% for classroom in classrooms %}
                <option value="{{ classroom.id }}">{{ classroom.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-4">
            <label class="form-label">&nbsp;</label>
            <button type="button" id="loadStudents" class="btn btn-primary w-100">
                <i class="fas fa-users"></i> تحميل الطلاب
            </button>
        </div>
    </div>

    <div id="studentsSection" class="students-section" style="display: none;">
        <div class="table-container">
            <div class="attendance-toolbar">
                <div>
                    <h4 class="attendance-title">قائمة الطلاب</h4>
                    <p id="attendanceHint" class="attendance-hint">اختر الحالة لكل طالب ثم احفظ الحضور.</p>
                </div>
                <div class="attendance-summary">
                    <div class="summary-badge">
                        <span>الإجمالي</span>
                        <strong id="totalStudentsCount">0</strong>
                    </div>
                    <div class="summary-badge summary-badge--present">
                        <span>حاضر</span>
                        <strong id="presentStudentsCount">0</strong>
                    </div>
                    <div class="summary-badge summary-badge--absent">
                        <span>غائب</span>
                        <strong id="absentStudentsCount">0</strong>
                    </div>
                </div>
            </div>

            <div class="attendance-actions">
                <button type="button" id="markAllPresent" class="btn btn-light bulk-btn">
                    <i class="fas fa-user-check"></i> تحديد الكل حاضر
                </button>
                <button type="button" id="markAllAbsent" class="btn btn-light bulk-btn">
                    <i class="fas fa-user-times"></i> تحديد الكل غائب
                </button>
            </div>

            <div id="studentsList"></div>

            <div class="attendance-footer">
                <span>راجع الحالات والملاحظات قبل الحفظ.</span>
                <button type="submit" class="btn btn-success">
                    <i class="fas fa-save"></i> حفظ الحضور
                </button>
            </div>
        </div>
    </div>
</form>

<script>
function updateAttendanceSummary() {
    const containers = document.querySelectorAll('.attendance-container');
    let present = 0;
    let absent = 0;

    containers.forEach(container => {
        const checked = container.querySelector('input[type="radio"]:checked');
        if (!checked) return;
        if (checked.value === 'present') present += 1;
        if (checked.value === 'absent') absent += 1;
    });

    document.getElementById('totalStudentsCount').textContent = containers.length;
    document.getElementById('presentStudentsCount').textContent = present;
    document.getElementById('absentStudentsCount').textContent = absent;
}

function updateAttendanceHint() {
    const classroomSelect = document.getElementById('classroom');
    const hint = document.getElementById('attendanceHint');
    const selectedText = classroomSelect.options[classroomSelect.selectedIndex]?.text || '';

    hint.textContent = classroomSelect.value
        ? `الشعبة الحالية: ${selectedText}. اختر الحالة لكل طالب ثم احفظ الحضور.`
        : 'اختر الحالة لكل طالب ثم احفظ الحضور.';
}

function syncAttendanceRowState(container, status) {
    const row = container.closest('.attendance-row');
    if (!row) return;

    row.classList.remove('attendance-row--present', 'attendance-row--absent');
    row.classList.add(status === 'absent' ? 'attendance-row--absent' : 'attendance-row--present');
}

function setAttendanceStatus(container, status) {
    const options = container.querySelectorAll('.attendance-option');
    const targetRadio = container.querySelector(`input[value="${status}"]`);
    if (!targetRadio) return;

    options.forEach(option => {
        option.classList.remove('active');
        option.style.opacity = '0.72';
        option.style.fontWeight = '600';
    });

    targetRadio.checked = true;

    const activeOption = targetRadio.closest('.attendance-option');
    if (activeOption) {
        activeOption.classList.add('active');
        activeOption.style.opacity = '1';
        activeOption.style.fontWeight = '800';
    }

    syncAttendanceRowState(container, status);
}

function applyBulkAttendance(status) {
    document.querySelectorAll('.attendance-container').forEach(container => {
        setAttendanceStatus(container, status);
    });
    updateAttendanceSummary();
}

function initializeAttendanceSelection() {
    const containers = document.querySelectorAll('.attendance-container');

    containers.forEach(container => {
        const options = container.querySelectorAll('.attendance-option');
        setAttendanceStatus(container, 'present');

        options.forEach(option => {
            option.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();

                const radio = this.querySelector('input[type="radio"]');
                if (!radio) return;

                setAttendanceStatus(container, radio.value);
                updateAttendanceSummary();
            });
        });
    });
}

document.getElementById('loadStudents').addEventListener('click', function() {
    const classroomId = document.getElementById('classroom').value;
    const date = document.getElementById('date').value;

    if (!classroomId || !date) {
        alert('يرجى اختيار التاريخ والشعبة');
        return;
    }

    fetch(`/attendance/api/students/?classroom=${classroomId}`)
        .then(response => response.json())
        .then(students => {
            if (students.error) {
                alert(students.error);
                return;
            }

            let html = `
                <div class="attendance-table-wrap">
                    <table class="table table-bordered attendance-table">
                        <thead class="table-light">
                            <tr>
                                <th width="8%">الرقم</th>
                                <th width="30%">الطالب</th>
                                <th width="40%">حالة الحضور</th>
                                <th width="22%">ملاحظات</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            students.forEach((student, index) => {
                html += `
                    <tr class="attendance-row">
                        <td class="student-index">${index + 1}</td>
                        <td class="student-name">${student.full_name}</td>
                        <td>
                            <div class="attendance-container" data-student-id="${student.id}">
                                <label class="attendance-option present-option active">
                                    <input type="radio" name="status_${student.id}" value="present" checked>
                                    <span class="option-text">حاضر</span>
                                </label>
                                <label class="attendance-option absent-option">
                                    <input type="radio" name="status_${student.id}" value="absent">
                                    <span class="option-text">غائب</span>
                                </label>
                            </div>
                        </td>
                        <td>
                            <input type="text" name="notes_${student.id}" class="form-control form-control-sm" placeholder="ملاحظات">
                        </td>
                    </tr>
                `;
            });

            html += `
                        </tbody>
                    </table>
                </div>
            `;

            document.getElementById('studentsList').innerHTML = html;
            document.getElementById('studentsSection').style.display = 'block';

            updateAttendanceHint();
            initializeAttendanceSelection();
            updateAttendanceSummary();
        })
        .catch(error => {
            console.error('Error:', error);
            alert('حدث خطأ في تحميل الطلاب');
        });
});

document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('attendanceForm');
    const markAllPresentBtn = document.getElementById('markAllPresent');
    const markAllAbsentBtn = document.getElementById('markAllAbsent');

    updateAttendanceHint();

    markAllPresentBtn.addEventListener('click', function() {
        applyBulkAttendance('present');
    });

    markAllAbsentBtn.addEventListener('click', function() {
        applyBulkAttendance('absent');
    });

    form.addEventListener('submit', function(e) {
        const date = document.getElementById('date').value;
        const classroom = document.getElementById('classroom').value;

        if (!date || !classroom) {
            e.preventDefault();
            alert('يرجى اختيار التاريخ والشعبة أولاً');
            return;
        }

        if (document.getElementById('studentsSection').style.display === 'none') {
            e.preventDefault();
            alert('يرجى تحميل قائمة الطلاب أولاً');
            return;
        }

        let presentCount = 0;
        let absentCount = 0;
        const formData = new FormData(this);

        for (let [key, value] of formData.entries()) {
            if (!key.startsWith('status_')) continue;
            if (value === 'present') presentCount++;
            if (value === 'absent') absentCount++;
        }

        const totalStudents = document.querySelectorAll('.attendance-container').length;
        const confirmation = confirm(`هل تريد حفظ حضور ${totalStudents} طالب؟\nالحاضرين: ${presentCount}\nالغائبين: ${absentCount}`);
        if (!confirmation) {
            e.preventDefault();
        }
    });
});

document.getElementById('classroom').addEventListener('change', function() {
    updateAttendanceHint();
    const date = document.getElementById('date').value;
    if (date && this.value) {
        document.getElementById('loadStudents').click();
    }
});

document.getElementById('date').addEventListener('change', function() {
    const classroom = document.getElementById('classroom').value;
    if (classroom && this.value) {
        document.getElementById('loadStudents').click();
    }
});
</script>

<style>

.students-section .table-container {
    background: rgba(255, 255, 255, 0.95);
    border: 1px solid rgba(118, 75, 162, 0.12);
    border-radius: 24px;
    box-shadow: 0 22px 48px rgba(73, 33, 116, 0.12);
}

.attendance-filters {
    margin: 0 0 1.5rem !important;
    padding: 1.35rem !important;
}

.students-section .table-container {
    padding: 1.5rem !important;
}

#attendanceForm .form-label {
    margin-bottom: 0.65rem !important;
    color: #49336b !important;
    font-weight: 800 !important;
}

#attendanceForm .form-control,
#attendanceForm select {
    min-height: 52px;
    border-radius: 16px !important;
    border: 1px solid rgba(118, 75, 162, 0.18) !important;
    background: rgba(255, 255, 255, 0.98) !important;
}

#attendanceForm .form-control:focus,
#attendanceForm select:focus {
    border-color: #764ba2 !important;
    box-shadow: 0 0 0 0.24rem rgba(118, 75, 162, 0.14) !important;
}

.attendance-toolbar,
.attendance-actions,
.attendance-footer {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    align-items: center;
    flex-wrap: wrap;
}

.attendance-toolbar {
    margin-bottom: 1rem;
}

.attendance-title {
    margin: 0 0 0.25rem;
    color: #40295f;
    font-size: 1.2rem;
    font-weight: 800;
}

.attendance-hint {
    margin: 0;
    color: #716180;
}

.attendance-summary {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
}

.summary-badge {
    min-width: 110px;
    padding: 0.8rem 0.95rem;
    border-radius: 18px;
    background: rgba(118, 75, 162, 0.08);
    border: 1px solid rgba(118, 75, 162, 0.12);
}

.summary-badge span {
    display: block;
    color: #6e6080;
    font-size: 0.84rem;
}

.summary-badge strong {
    color: #341d52;
    font-size: 1.15rem;
    font-weight: 800;
}

.summary-badge--present {
    background: rgba(46, 160, 67, 0.08);
    border-color: rgba(46, 160, 67, 0.16);
}

.summary-badge--present strong {
    color: #227a35;
}

.summary-badge--absent {
    background: rgba(220, 53, 69, 0.08);
    border-color: rgba(220, 53, 69, 0.16);
}

.summary-badge--absent strong {
    color: #b42339;
}

.attendance-actions {
    margin-bottom: 1rem;
}

.bulk-btn {
    min-height: 48px;
    border-radius: 16px !important;
    border: 1px solid rgba(118, 75, 162, 0.16) !important;
    color: #5a3c82 !important;
    font-weight: 700 !important;
}

.attendance-table-wrap {
    overflow-x: auto;
    border-radius: 20px;
}

.attendance-table {
    min-width: 860px;
    margin-bottom: 0 !important;
    border-collapse: separate !important;
    border-spacing: 0 !important;
}

.attendance-table thead th {
    background: linear-gradient(135deg, #6f4699 0%, #8c67b5 100%) !important;
    color: #fff !important;
    border: none !important;
    padding: 1rem 0.85rem !important;
    text-align: center;
}

.attendance-table td {
    padding: 1rem 0.75rem !important;
    text-align: center;
    vertical-align: middle;
    border-color: rgba(118, 75, 162, 0.1) !important;
}

.attendance-row:nth-child(even) td {
    background: rgba(118, 75, 162, 0.02);
}

.attendance-row--present td {
    background: linear-gradient(90deg, rgba(46, 160, 67, 0.045), rgba(255, 255, 255, 0.98)) !important;
}

.attendance-row--absent td {
    background: linear-gradient(90deg, rgba(220, 53, 69, 0.055), rgba(255, 255, 255, 0.98)) !important;
}

.student-index {
    color: #5b3c82 !important;
    font-weight: 800 !important;
}

.student-name {
    color: #261a3f !important;
    font-weight: 700 !important;
}

    color: #1f6f31 !important;
}

.attendance-container {
    display: flex;
    gap: 0.85rem;
    justify-content: center;
}

.attendance-option {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    min-width: 104px;
    padding: 0.85rem 1rem;
    border-radius: 16px;
    border: 2px solid transparent;
    cursor: pointer;
    font-weight: 600;
    opacity: 0.72;
    transition: all 0.2s ease;
    background: rgba(255, 255, 255, 0.98);
}

.attendance-option input[type="radio"] {
    display: none;
}

.attendance-option:hover {
    opacity: 0.95;
}

#studentsSection .attendance-container .attendance-option.active {
    opacity: 1 !important;
    font-weight: 800 !important;
    transform: translateY(-1px);
}

.present-option {
    color: #6d6480;
    border-color: rgba(118, 75, 162, 0.16);
}

.absent-option {
    color: #6d6480;
    border-color: rgba(118, 75, 162, 0.16);
}

#studentsSection .attendance-container .present-option.active {
    background: linear-gradient(135deg, #2ea043 0%, #3bb257 100%) !important;
    background-color: #2ea043 !important;
    color: #ffffff !important;
    border-color: #2ea043 !important;
    box-shadow: 0 12px 24px rgba(46, 160, 67, 0.2) !important;
}

#studentsSection .attendance-container .absent-option.active {
    background: linear-gradient(135deg, #d83b52 0%, #ef5b73 100%) !important;
    background-color: #d83b52 !important;
    color: #ffffff !important;
    border-color: #d83b52 !important;
    box-shadow: 0 12px 24px rgba(216, 59, 82, 0.18) !important;
}

#studentsSection .attendance-container .attendance-option.active .option-text {
    color: #ffffff !important;
}

.attendance-footer {
    margin-top: 1rem;
}

.attendance-footer span {
    color: #68597b;
    font-weight: 600;
}

#attendanceForm .btn-success,
#attendanceForm .btn-primary {
    min-height: 52px;
    border-radius: 16px !important;
    font-weight: 800 !important;
}

@media (max-width: 991.98px) {
    .students-section .table-container {
        overflow-x: auto;
    }
}

@media (max-width: 767.98px) {
    .attendance-filters,
    .students-section .table-container {
        padding: 1rem !important;
        border-radius: 20px;
    }

    .module-header {
        align-items: stretch !important;
    }

    .module-header .header-actions,
    .attendance-toolbar,
    .attendance-summary,
    .attendance-actions,
    .attendance-footer {
        flex-direction: column;
        align-items: stretch;
    }

    .module-header .btn,
    .bulk-btn,
    .attendance-footer .btn {
        width: 100%;
    }

    .attendance-container {
        flex-direction: column;
    }

    .attendance-option {
        width: 100%;
    }
}
</style>
{% endblock %}

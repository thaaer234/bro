{% extends "base.html" %}
{% load widget_tweaks %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0"><i class="fas fa-lock me-2"></i>إقفال الفصل الدراسي</h4>
                </div>
                <div class="card-body">
                    <div class="alert alert-warning">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        <strong>تحذير:</strong> هذه العملية لا يمكن التراجع عنها. سيتم إقفال الفصل الدراسي {{ academic_year.name }} - {{ academic_year.year }}
                    </div>
                    
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="password" class="form-label">كلمة مرور المستخدم للتأكيد</label>
                            <input type="password" name="password" class="form-control" required 
                                   placeholder="أدخل كلمة المرور للتأكيد">
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger">
                                <i class="fas fa-lock me-2"></i>تأكيد الإقفال
                            </button>
                            <a href="{% url 'quick:academic_year_list' %}" class="btn btn-secondary">
                                <i class="fas fa-times me-2"></i>إلغاء
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

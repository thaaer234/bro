{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}خطأ{% endblock %} | معهد اليمن</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/sections/errors.css' %}">
    <link rel="stylesheet" href="{% static 'css/premium-redesign.css' %}">
</head>
<body class="app-body error-body-premium">
    <main class="error-fullscreen {% block error_theme %}error-theme--info{% endblock %}">
        <div class="error-fullscreen__ambient error-fullscreen__ambient--one"></div>
        <div class="error-fullscreen__ambient error-fullscreen__ambient--two"></div>
        <div class="error-fullscreen__brand">
            <img src="{% static 'img/logo.png' %}" alt="شعار معهد اليمن" class="error-fullscreen__logo">
            <span class="error-fullscreen__brand-name">معهد اليمن</span>
        </div>
        <section class="error-fullscreen__center">
            {% block content %}{% endblock %}
        </section>
    </main>
</body>
</html>

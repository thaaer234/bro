<!DOCTYPE html>
{% load static %}
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}خطأ{% endblock %} - معهد اليمان</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #764ba2;
            --primary-dark: #5f3789;
            --secondary: #9c7ac4;
            --accent: #c7b0df;
            --dark: #352146;
            --light: #f7f2fc;
            --gradient-primary: linear-gradient(135deg, #8e63b7 0%, #764ba2 100%);
            --gradient-secondary: linear-gradient(135deg, #9c7ac4 0%, #764ba2 100%);
            --gradient-dark: linear-gradient(135deg, #352146 0%, #5f3789 100%);
            --shadow: 0 10px 30px rgba(118, 75, 162, 0.15);
            --shadow-lg: 0 20px 50px rgba(118, 75, 162, 0.22);
            --radius: 16px;
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background:
                radial-gradient(circle at top left, rgba(118, 75, 162, 0.16), transparent 24%),
                radial-gradient(circle at bottom right, rgba(156, 122, 196, 0.14), transparent 24%),
                linear-gradient(180deg, rgba(250, 247, 254, 0.94) 0%, rgba(241, 234, 250, 0.94) 100%),
                url("{% static 'img/back.png' %}");
            background-size: auto, auto, auto, cover;
            background-position: top left, bottom right, center, center;
            background-repeat: no-repeat, no-repeat, no-repeat, no-repeat;
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
            {% comment %} padding: 0 20px; {% endcomment %}
        }

        /* Header Styles */
        header {
            background: var(--gradient-dark);
            box-shadow: var(--shadow);
            padding: 15px 0;
            position: relative;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo img {
            height: 70px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
            transition: var(--transition);
        }

        .logo:hover img {
            transform: scale(1.05) rotate(5deg);
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-name {
            font-weight: 800;
            font-size: 1.8rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }

        .logo-tagline {
            font-size: 1.1rem;
            color: var(--secondary);
            margin-top: 5px;
            font-weight: 600;
        }

        .particles-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: var(--secondary);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 15s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-1000px) rotate(720deg); }
        }

        /* Error Container */
        .error-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
            position: relative;
            overflow: hidden;
        }

        .error-content {
            text-align: center;
            max-width: 900px;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        .error-graphic {
            margin-bottom: 30px;
            position: relative;
        }

        .error-svg {
            max-width: 500px;
            height: auto;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
        }

        .error-title {
            font-size: 8rem;
            font-weight: 900;
            margin-bottom: 10px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 5px 15px rgba(255, 46, 99, 0.3);
            line-height: 1;
        }

        .error-code {
            font-size: 1.5rem;
            color: var(--secondary);
            margin-bottom: 20px;
            font-weight: 600;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .error-message {
            font-size: 2.2rem;
            margin-bottom: 25px;
            color: var(--dark);
            font-weight: 700;
        }

        .error-description {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #666;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.8;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            padding: 16px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            transition: var(--transition);
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.7s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: var(--shadow-lg);
        }

        .btn-secondary {
            background: var(--gradient-secondary);
            color: white;
        }

        .btn-secondary:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: var(--shadow-lg);
        }

        .btn-outline {
            background: transparent;
            color: var(--dark);
            border: 2px solid var(--dark);
        }

        .btn-outline:hover {
            background: var(--dark);
            color: white;
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        /* Footer Styles */
        footer {
            background: var(--gradient-dark);
            color: white;
            padding: 25px 0;
            text-align: center;
            margin-top: auto;
            position: relative;
            overflow: hidden;
        }

        footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--gradient-primary);
        }

        /* Responsive Styles */
        @media (max-width: 1200px) {
            .error-title {
                font-size: 6rem;
            }
            
            .error-message {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }
            
            .logo img {
                height: 60px;
                margin-bottom: 10px;
            }
            
            .error-title {
                font-size: 4.5rem;
            }
            
            .error-message {
                font-size: 1.5rem;
            }
            
            .action-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                max-width: 300px;
                justify-content: center;
            }
            
            .error-svg {
                max-width: 300px;
            }
        }

        /* Floating Animation */
        @keyframes floating {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .floating {
            animation: floating 6s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <!-- Floating Particles Background -->
    <div class="particles-container" id="particles-container"></div>

    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <img src="{% static 'img/logo.png' %}" alt="شعار معهد اليمان" class="floating">
                    <div class="logo-text">
                        <div class="logo-name">معهد اليمان</div>
                        {% comment %} <div class="logo-tagline">نور العلم والمعرفة</div> {% endcomment %}
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <footer>
        <div class="container">
            <p>جميع الحقوق محفوظة &copy; {% now "Y" %} معهد اليمان - نور العلم والمعرفة</p>
        </div>
    </footer>

    <script>
        // Create floating particles
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.getElementById('particles-container');
            const particleCount = 20;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                // Random properties
                const size = Math.random() * 20 + 5;
                const posX = Math.random() * 100;
                const posY = Math.random() * 100;
                const delay = Math.random() * 15;
                const duration = Math.random() * 20 + 10;
                
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${posX}%`;
                particle.style.top = `${posY}%`;
                particle.style.animationDelay = `${delay}s`;
                particle.style.animationDuration = `${duration}s`;
                
                // Random color
                const colors = ['#FF2E63', '#08D9D6', '#FFC107', '#EAEAEA'];
                const color = colors[Math.floor(Math.random() * colors.length)];
                particle.style.background = color;
                
                container.appendChild(particle);
            }
        });
    </script>
</body>
</html>

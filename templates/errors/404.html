{% extends "error_base.html" %}

{% block title %}404{% endblock %}
{% block error_theme %}error-theme--info{% endblock %}

{% block content %}
<section class="error-compact">
    <div class="error-minimal">
        <div class="error-minimal__halo"></div>
        <div class="error-minimal__code" aria-label="404">404</div>
    </div>
    <div class="error-compact__content">
        <p class="error-compact__desc">الصفحة التي تبحث عنها غير موجودة.</p>
        <p class="error-compact__hint">تلميح: قد يكون الرابط قديماً أو غير صحيح.</p>
        <div class="error-compact__actions">
            <button type="button" class="btn btn-primary" onclick="history.back()">
                <i class="fas fa-arrow-right"></i>
                العودة
            </button>
            <a href="{% url 'login' %}" class="btn btn-outline-primary">
                <i class="fas fa-right-to-bracket"></i>
                تسجيل الدخول
            </a>
        </div>
    </div>
</section>
{% endblock %}

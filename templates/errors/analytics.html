<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحليلات الأخطاء</title>
        <link rel="stylesheet" href="{% static 'css/sections/errors.css' %}">
</head>
<body>
    <div class="container">
        <h1>تحليلات الأخطاء</h1>
        
        <div class="card">
            <h2>إحصائيات الأخطاء</h2>
            <p>هذه صفحة تحليلات الأخطاء - تحت التطوير</p>
        </div>

        <!-- يمكنك إضافة المزيد من المحتوى هنا -->
        {% if error_stats %}
            <div class="card">
                <h3>إحصائيات:</h3>
                <pre>{{ error_stats|pprint }}</pre>
            </div>
        {% endif %}
    </div>
</body>
</html>

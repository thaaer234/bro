{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طباعة دليل {{ manual_target_name }} | معهد الإيمان</title>
    <link rel="icon" type="image/x-icon" href="{% static 'img/logo.png' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="{% static 'css/responsive.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/ui-refresh.css' %}">
    <link rel="stylesheet" href="{% static 'css/sections/pages.css' %}">
    <link rel="stylesheet" href="{% static 'css/site-unify-overrides.css' %}">
    <link rel="stylesheet" href="{% static 'css/module-unify-overrides.css' %}">
    <link rel="stylesheet" href="{% static 'css/premium-redesign.css' %}">
    <link rel="stylesheet" href="{% static 'css/manuals-handbook-a4.css' %}?v=11">
    <style>
        :root {
            --uhb-page-width: 210mm;
            --uhb-page-height: 297mm;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            background:
                radial-gradient(circle at top right, rgba(15, 118, 110, 0.12), transparent 24%),
                radial-gradient(circle at bottom left, rgba(196, 139, 58, 0.1), transparent 22%),
                linear-gradient(180deg, #edf3f8 0%, #f7fafc 100%);
        }

        .print-page-shell {
            min-height: 100vh;
            padding: 1.5rem 0;
            display: flex;
            justify-content: center;
        }

        @page {
            size: A4 portrait;
            margin: 0;
        }

        @media print {
            html,
            body {
                width: var(--uhb-page-width);
                min-width: var(--uhb-page-width);
                background: #fff;
            }

            body {
                margin: 0 !important;
                padding: 0 !important;
                background: #fff;
            }

            .print-page-shell {
                padding: 0;
                display: block;
                width: var(--uhb-page-width);
                min-width: var(--uhb-page-width);
            }
        }
    </style>
</head>
<body>
    <main class="print-page-shell">
        {% include "manuals/_user_handbook_content.html" %}
    </main>
</body>
</html>

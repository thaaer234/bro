{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طباعة دليل {{ manual_target_name }} | معهد اليمان</title>
    <link rel="icon" type="image/x-icon" href="{% static 'img/logo.png' %}">
    <link rel="stylesheet" href="{% static 'css/local-fonts.css' %}">
    <link rel="stylesheet" href="{% static 'css/manuals-user-handbook-redesign.css' %}?v=1">
    <style>
        .print-page-shell {
            min-height: 100vh;
            padding: 1.5rem 0;
            display: flex;
            justify-content: center;
        }

        @page {
            size: A4 portrait;
            margin: 0;
        }

        @media print {
            html,
            body {
                width: 210mm;
                min-width: 210mm;
                height: auto;
                background: #fff;
                margin: 0 !important;
                padding: 0 !important;
            }

            body {
                background: #fff;
            }

            .print-page-shell {
                padding: 0;
                display: block;
                width: 210mm;
                min-width: 210mm;
                margin: 0 !important;
            }
        }
    </style>
</head>
<body>
    <main class="print-page-shell">
        {% include "manuals/_user_handbook_content.html" %}
    </main>
</body>
</html>
